name: Deploy AWS Static Site

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build and upload artifact only. Set false after AWS infra and OIDC are ready."
        type: boolean
        default: true
  # Enable after the first successful manual production deploy.
  # push:
  #   branches: [main]
  #   paths:
  #     - ".github/workflows/deploy-aws-static-site.yml"
  #     - "astro.config.mjs"
  #     - "package.json"
  #     - "package-lock.json"
  #     - "public/**"
  #     - "src/**"

permissions:
  contents: read
  id-token: write

concurrency:
  group: coderturtle-io-aws-static-site
  cancel-in-progress: false

env:
  NODE_VERSION: "20"
  BUILD_DIR: dist
  ASTRO_TELEMETRY_DISABLED: "1"

jobs:
  build:
    name: Build static site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: coderturtle-io-dist
          path: ${{ env.BUILD_DIR }}
          if-no-files-found: error
          retention-days: 14

  deploy:
    name: Sync S3 and invalidate CloudFront
    needs: build
    runs-on: ubuntu-latest
    if: ${{ github.ref == 'refs/heads/main' && inputs.dry_run == false }}
    environment:
      name: production
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_DEPLOY_ROLE_ARN: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
      S3_BUCKET: ${{ vars.S3_BUCKET }}
      CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: coderturtle-io-dist
          path: ${{ env.BUILD_DIR }}

      - name: Check deployment configuration
        run: |
          test -n "$AWS_REGION"
          test -n "$AWS_DEPLOY_ROLE_ARN"
          test -n "$S3_BUCKET"
          test -n "$CLOUDFRONT_DISTRIBUTION_ID"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync general files
        run: |
          aws s3 sync "$BUILD_DIR/" "s3://$S3_BUCKET/" \
            --delete \
            --only-show-errors \
            --cache-control "public,max-age=0,must-revalidate" \
            --exclude "_astro/*"

      - name: Sync hashed Astro assets
        run: |
          if [ -d "$BUILD_DIR/_astro" ]; then
            aws s3 sync "$BUILD_DIR/_astro/" "s3://$S3_BUCKET/_astro/" \
              --delete \
              --only-show-errors \
              --cache-control "public,max-age=31536000,immutable"
          fi

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "$CLOUDFRONT_DISTRIBUTION_ID" \
            --paths "/*"
